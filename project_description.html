<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1. Kritéria Popisu Projektu | Dynamický Kalkulátor</title>
    <!-- Using Tailwind CSS from CDN for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Main font and background color - using the blue theme */
        body { font-family: 'Inter', sans-serif; background-color: #f7f9fc; }
        
        /* Highlight color for selection (Blue variant) */
        .selected {
            @apply ring-4 ring-offset-2 ring-blue-600 !important;
            background-color: #1d4ed8 !important; /* Blue-700 */
            color: white !important;
        }
        /* Style for buttons to ensure consistent height */
        .criterion-btn {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 100%;
        }
    </style>
</head>
<body class="p-4 md:p-8 min-h-screen flex flex-col items-center">

    <!-- Main content card -->
    <div class="max-w-6xl w-full bg-white shadow-2xl rounded-xl p-6 md:p-10">
        <h1 class="text-3xl font-extrabold text-blue-700 mb-4 border-b-2 border-blue-300 pb-2">
            1. Popis Projektu: Kritéria Projektové Dokumentace
        </h1>
        <p class="text-md text-gray-500 mb-6">
            Klikněte na kritéria, která se na projektovou dokumentaci aplikují. Dynamická známka se zobrazí nahoře.
        </p>

        <!-- Dynamic Grade Display -->
        <div class="flex flex-col md:flex-row items-center justify-between p-4 mb-8 rounded-lg shadow-inner bg-blue-50 border border-blue-200">
            <div class="flex-1 text-center md:text-left mb-2 md:mb-0">
                <h2 class="text-2xl font-semibold text-gray-700">Celková Odchylka Bodů: <span id="totalDeviationDisplay" class="font-bold text-blue-600 transition-colors duration-300">0.0</span></h2>
            </div>
            <div class="flex-1 text-center">
                <h2 class="text-3xl font-bold text-gray-700">Výsledná Známka:</h2>
            </div>
            <div class="flex-1 text-center md:text-right">
                <p id="finalGradeDisplay" class="text-6xl font-black text-blue-800 transition-colors duration-300">1</p>
            </div>
        </div>

        <!-- Explanation and Copy Section -->
        <div class="mt-6 p-4 rounded-lg bg-gray-100 border border-gray-300">
            <div class="flex flex-col md:flex-row items-start md:items-center justify-between">
                <h3 class="text-xl font-semibold text-gray-700 mb-3 md:mb-0">Zdůvodnění známky:</h3>
                <button id="copyButton" class="px-4 py-2 bg-blue-500 text-white font-medium rounded-lg shadow-md hover:bg-blue-600 transition duration-300 text-sm">
                    Kopírovat Zdůvodnění
                </button>
            </div>
            <p id="explanationText" class="mt-3 text-gray-800 whitespace-pre-line text-sm md:text-base">
                <!-- Text bude generován JavaScriptem -->
            </p>
        </div>

        <!-- Criteria Container - Single Grid -->
        <div id="criteriaContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 mt-6">
            <!-- Tlačítka budou generována zde -->
        </div>

        <p class="mt-8 text-center text-gray-500">
            <a href="index.html" class="text-blue-600 hover:text-blue-800 font-semibold transition duration-300">← Zpět do Hlavního Menu</a>
        </p>
    </div>

    <script>
        // --- 1. CRITERIA DEFINITION ---
        const CRITERIA = [
            // Hodnocení projektové dokumentace
            { text: "Nebyly vyplněny všechny potřebné části", value: -4.0 }, 
            { text: "Projekt není vhodný pro hodiny cizího jazyka", value: -4.0 }, 
            { text: "Cíl není měřitelný a dosažitelný", value: -2.0 }, 
            { text: "Rozsah projektu neodpovídá dostupnému času", value: -2.0 }, 
            { text: "Nejsou srozumitelné doplňkové průběžné a závěrečné produkty", value: -1.0 }, 
            { text: "Plán práce není realistický nebo dostatečně podrobný", value: -2.0 }, 
            { text: "Časový harmonogram není správně vyplněný", value: -1.0 }, 
        ];

        // --- 2. STATE VARIABLES ---
        let selectedCriteria = new Set();
        let totalDeviation = 0.0;
        // Poznámka: Zde není kritérium pro Známku 5 Override ani pro zlepšení (+1).

        // --- 3. DOM ELEMENT REFERENCES ---
        const deviationDisplay = document.getElementById('totalDeviationDisplay');
        const gradeDisplay = document.getElementById('finalGradeDisplay');
        const explanationText = document.getElementById('explanationText');
        const container = document.getElementById('criteriaContainer'); 
        const copyButton = document.getElementById('copyButton');

        // --- 4. CORE FUNCTIONS ---

        /**
         * Kalkuluje výslednou známku na základě kumulativní odchylky bodů.
         */
        function calculateFinalGrade() {
            let gradeValue = 1 - totalDeviation;

            if (gradeValue < 1) gradeValue = 1;

            // Omezení maximální známky na 5
            if (gradeValue >= 5.5) {
                return '5'; 
            }

            // Zaokrouhlení na půlbod
            const fractionalPart = gradeValue % 1;
            const numericGrade = Math.floor(gradeValue);

            if (fractionalPart > 0.499) {
                return `${numericGrade}+`;
            } else {
                return `${numericGrade}`;
            }
        }

        /**
         * Generuje textové zdůvodnění známky.
         */
        function generateExplanationText(finalGrade) {
            if (selectedCriteria.size === 0) {
                return `Výsledná známka je ${finalGrade}, jelikož projektová dokumentace splnila všechna základní kritéria.`;
            }

            let explanation = `Výsledná známka je ${finalGrade}, jelikož byly zjištěny následující nedostatky:\n\n`;
            
            selectedCriteria.forEach(index => {
                const item = CRITERIA[index];
                explanation += `- ${item.text} (${item.value.toFixed(1)} bodu)\n`;
            });

            return explanation.trim();
        }

        /**
         * Aktualizuje celkovou odchylku a znovu vypočítá známku.
         */
        function updateGradeDisplay() {
            totalDeviation = 0.0;
            
            selectedCriteria.forEach(index => {
                const item = CRITERIA[index];
                totalDeviation += item.value;
            });

            // Přesné zobrazení odchylky
            deviationDisplay.textContent = totalDeviation.toFixed(1);
            
            // Nastavení barvy odchylky
            deviationDisplay.classList.remove('text-blue-600', 'text-red-600');
            if (totalDeviation < 0) {
                deviationDisplay.classList.add('text-red-600');
            } else {
                deviationDisplay.classList.add('text-blue-600'); 
            }

            // Výpočet a zobrazení známky
            const finalGrade = calculateFinalGrade();
            gradeDisplay.textContent = finalGrade;
            
            // --- NEW: Update Explanation ---
            explanationText.textContent = generateExplanationText(finalGrade);

            // Nastavení barvy známky
            gradeDisplay.classList.remove('text-blue-800', 'text-red-700');
            if (finalGrade.startsWith('5')) { 
                 gradeDisplay.classList.add('text-red-700');
            } else {
                 gradeDisplay.classList.add('text-blue-800');
            }
        }

        /**
         * Inicializuje tlačítka v jedné mřížce.
         */
        function initCriteriaButtons() {
            container.innerHTML = ''; 

            CRITERIA.forEach((item, index) => {
                const button = document.createElement('button');
                
                let bgColor = 'bg-blue-100';
                let hoverColor = 'hover:bg-blue-200';
                let textColor = 'text-blue-800';
                let valueText = `(${item.value > 0 ? '+' : ''}${item.value.toFixed(1)})`;


                // Nastavení tříd a obsahu
                button.className = `criterion-btn w-full p-4 rounded-lg text-left shadow-md transition duration-200 ${bgColor} ${hoverColor} ${textColor} text-sm`;
                button.innerHTML = `
                    <span class="font-semibold">${item.text}</span>
                    <span class="mt-2 text-xs opacity-80">${valueText}</span>
                `;
                button.setAttribute('data-index', index);
                
                // Přidání posluchače událostí
                button.addEventListener('click', () => {
                    const criterionIndex = index;
                    if (selectedCriteria.has(criterionIndex)) {
                        selectedCriteria.delete(criterionIndex);
                        button.classList.remove('selected');
                    } else {
                        selectedCriteria.add(criterionIndex);
                        button.classList.add('selected');
                    }
                    updateGradeDisplay();
                });

                container.appendChild(button);
            });
            
            // Počáteční výpočet při načtení
            updateGradeDisplay();
        }
        
        // --- NEW: Copy to Clipboard Functionality ---
        copyButton.addEventListener('click', function() {
            const textToCopy = explanationText.textContent;
            
            const textarea = document.createElement('textarea');
            textarea.value = textToCopy;
            textarea.style.position = 'fixed'; 
            textarea.style.opacity = '0';
            document.body.appendChild(textarea);
            textarea.select();
            
            try {
                document.execCommand('copy');
                this.textContent = 'Zkopírováno!';
                this.classList.replace('bg-blue-500', 'bg-green-500');
                this.classList.replace('hover:bg-blue-600', 'hover:bg-green-600');
                
                setTimeout(() => {
                    this.textContent = 'Kopírovat Zdůvodnění';
                    this.classList.replace('bg-green-500', 'bg-blue-500');
                    this.classList.replace('hover:bg-green-600', 'hover:bg-blue-600');
                }, 2000);
            } catch (err) {
                console.error('Nepodařilo se zkopírovat text: ', err);
                this.textContent = 'Chyba kopírování!';
            }
            document.body.removeChild(textarea);
        });

        // Spuštění inicializace po načtení stránky
        window.onload = initCriteriaButtons;
    </script>
</body>
</html>
